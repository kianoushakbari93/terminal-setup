---
# Deploy targets (overridable for testing).
ts_zsh_rc: "{{ ansible_facts['user_dir'] }}/.zshrc"
ts_zsh_p10k: "{{ ansible_facts['user_dir'] }}/.p10k.zsh"
ts_zsh_zdotdir: "{{ ansible_facts['user_dir'] }}"

# Catppuccin Mocha palette - the single source of truth for the zsh prompt and
# syntax-highlight colours. Change here to retheme without touching templates.
ts_zsh_palette:
  rosewater: "#f5e0dc"
  flamingo: "#f2cdcd"
  pink: "#f5c2e7"
  mauve: "#cba6f7"
  red: "#f38ba8"
  maroon: "#eba0ac"
  peach: "#fab387"
  yellow: "#f9e2af"
  green: "#a6e3a1"
  teal: "#94e2d5"
  sky: "#89dceb"
  sapphire: "#74c7ec"
  blue: "#89b4fa"
  lavender: "#b4befe"
  text: "#cdd6f4"
  subtext1: "#bac2de"
  subtext0: "#a6adc8"
  overlay2: "#9399b2"
  overlay1: "#7f849c"
  overlay0: "#6c7086"
  surface2: "#585b70"
  surface1: "#45475a"
  surface0: "#313244"
  base: "#1e1e2e"
  mantle: "#181825"
  crust: "#11111b"

# The stack zsh; resolved explicitly because the invoking shell may not have
# the brew prefix on PATH (e.g. first run, or re-runs before re-login).
ts_zsh_bin: "{{ ts_brew_prefix }}/bin/zsh"

# Run the deep zsh health probe after deploy (disable in unit-style runs).
ts_zsh_health_check: true
