---
# Resolve per-OS path facts (brew prefix, plugin share dir, font dir) and expose
# them play-wide for later roles (fonts, shells, configs).
- name: Resolve per-OS path facts
  ts_platform_facts:

# Resolve the distro once (lower-cased) so the package layer can pick the native
# manager on Linux. Empty on macOS, where it is not needed.
- name: Determine distro id
  ansible.builtin.set_fact:
    ts_distro: "{{ ansible_facts['distribution'] | default('') | lower }}"

# Install each logical package via the correct manager, idempotently. Entries
# with an `os` key only apply to that platform (e.g. Linux-only clipboard tools).
- name: Install packages
  package_install:
    name: "{{ item.name }}"
    kind: "{{ item.kind }}"
    package_map: "{{ ts_package_map }}"
    distro: "{{ ts_distro | default(omit) }}"
  when: (item.os | default(ts_os_family)) == ts_os_family
  loop: "{{ ts_packages }}"
  loop_control:
    label: "{{ item.name }} ({{ item.kind }})"

# Health probe: every package that declares a `check` command must resolve on
# PATH. `command -v` is a shell builtin, so this must be the shell module
# (`executable` is unsupported on the command module since Ansible 2.4). The
# brew prefix is prepended so verification also passes when the invoking shell
# does not have Homebrew/Linuxbrew on PATH yet (e.g. re-runs before re-login).
- name: Verify packages resolve on PATH
  ansible.builtin.shell: "command -v {{ item.check }}"
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ ts_brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] | default(lookup('env', 'PATH')) }}"
  changed_when: false
  when: (item.os | default(ts_os_family)) == ts_os_family
  loop: "{{ ts_packages | selectattr('check', 'defined') | list }}"
  loop_control:
    label: "{{ item.check }}"
