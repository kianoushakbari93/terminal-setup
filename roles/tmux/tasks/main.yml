---
# Ensure per-OS path facts exist when this role runs in isolation.
- name: Ensure per-OS path facts
  ts_platform_facts:
  when: ts_brew_prefix is not defined

# Detect a battery so the status bar can fall back to a CPU/load spacer on
# batteryless hosts (where the battery module would render empty).
- name: Detect battery presence
  ansible.builtin.shell: |
    if [ "$(uname)" = "Darwin" ]; then
      pmset -g batt 2>/dev/null | grep -q "InternalBattery" && echo yes || echo no
    else
      ls /sys/class/power_supply/BAT* >/dev/null 2>&1 && echo yes || echo no
    fi
  register: ts_batt
  changed_when: false
  when: ts_tmux_has_battery is not defined

- name: Set battery fact
  ansible.builtin.set_fact:
    ts_tmux_has_battery: "{{ ts_batt.stdout | default('yes') == 'yes' }}"
  when: ts_tmux_has_battery is not defined

# Ensure tpm is installed, then install declared plugins non-interactively.
- name: Install tpm
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ ts_tmux_plugins_dir }}/tpm"
    depth: 1
    version: master
  when: ts_tmux_install_plugins | bool
  tags: [tmux_install]

- name: Install tmux plugins via tpm
  ansible.builtin.command: "{{ ts_tmux_plugins_dir }}/tpm/bin/install_plugins"
  register: ts_tpm
  changed_when: "'Already installed' not in ts_tpm.stdout"
  when: ts_tmux_install_plugins | bool
  tags: [tmux_install]

# Render and deploy ~/.tmux.conf through the merge engine. tmux sources its
# .local via `source-file`, so that is the merge engine's source line.
- name: Deploy ~/.tmux.conf
  config_merge:
    target_path: "{{ ts_tmux_conf }}"
    managed_content: "{{ lookup('template', 'tmux.conf.j2') }}"
    source_line: "source-file -q ~/.tmux.conf.local"
    backup_root: "{{ ts_backup_root }}"

# Deep tmux health probe (isolated socket; non-destructive).
- name: Verify tmux is healthy
  tmux_health:
    conf_path: "{{ ts_tmux_conf }}"
    home: "{{ ts_tmux_home }}"
    tmux_bin: "{{ ts_tmux_bin }}"
  when: ts_tmux_health_check | bool
  tags: [tmux_verify]
