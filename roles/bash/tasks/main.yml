---
# Ensure per-OS path facts exist when this role runs in isolation.
- name: Ensure per-OS path facts
  ts_platform_facts:
  when: ts_brew_prefix is not defined

# Install ble.sh (not in standard package managers) - idempotent: skip if present.
- name: Check for ble.sh
  ansible.builtin.stat:
    path: "{{ ts_blesh_dir }}/ble.sh"
  register: ts_blesh

- name: Install ble.sh
  ansible.builtin.shell: |
    set -e
    tmp="$(mktemp -d)"
    git clone --recursive --depth 1 https://github.com/akinomyoga/ble.sh.git "$tmp/ble.sh"
    make -C "$tmp/ble.sh" install PREFIX="{{ ts_bash_home }}/.local"
    rm -rf "$tmp"
  when: not ts_blesh.stat.exists
  tags: [bash_install]

# Render and deploy ~/.bashrc and ~/.bash_profile through the merge engine
# (foreign content preserved in *.local, sourced at the end).
- name: Deploy ~/.bashrc
  config_merge:
    target_path: "{{ ts_bash_rc }}"
    managed_content: "{{ lookup('template', 'bashrc.j2') }}"
    backup_root: "{{ ts_backup_root }}"

- name: Deploy ~/.bash_profile
  config_merge:
    target_path: "{{ ts_bash_profile }}"
    managed_content: "{{ lookup('template', 'bash_profile.j2') }}"
    backup_root: "{{ ts_backup_root }}"

# starship.toml is TOML, not shell: it cannot `source` a .local file, so the
# merge engine uses a TOML comment as the "source line" (foreign content is still
# backed up and preserved in starship.toml.local).
- name: Deploy ~/.config/starship.toml
  config_merge:
    target_path: "{{ ts_starship_toml }}"
    managed_content: "{{ lookup('template', 'starship.toml.j2') }}"
    source_line: "# foreign config preserved in starship.toml.local (not auto-applied)"
    backup_root: "{{ ts_backup_root }}"

# Deep bash health probe.
- name: Verify bash is healthy
  bash_health:
    home: "{{ ts_bash_home }}"
    bash_bin: "{{ ts_bash_bin }}"
  when: ts_bash_health_check | bool
  tags: [bash_verify]
